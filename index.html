<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自訂圖片西瓜遊戲</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; font-family: Arial, sans-serif; }
        #game-container { position: relative; margin-top: 20px; }
        #score-board { font-size: 24px; font-weight: bold; margin-top: 10px; color: #333; }
        #hint { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="score-board">分數: <span id="score">0</span></div>
    <div id="hint">左右移動滑鼠調整位置，點擊滑鼠左鍵釋放水果</div>
    <div id="game-container"></div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;

const container = document.getElementById('game-container');
const scoreDisplay = document.getElementById('score');

const WIDTH = 450;
const HEIGHT = 650;
let score = 0;
let currentFruit = null;
let isReadyToDrop = true;

// --- 💡 這裡修改水果設定 ---
// 如果你想換成網路圖片，只要在該水果加上 texture: "圖片網址", 並且給它圖片的原始寬度即可。
const FRUIT_TYPES = [
    { label: "🍒", radius: 15, color: "#ff4d4d", score: 1 },
    { label: "🍓", radius: 22, color: "#ff7675", score: 3 },
    { label: "🍇", radius: 30, color: "#a29bfe", score: 6 },
    { label: "🍊", radius: 38, color: "#fdcb6e", score: 10 },
    { label: "🍅", radius: 48, color: "#e17055", score: 15 },
    { label: "🍎", radius: 58, color: "#d63031", score: 21 },
    { label: "🍐", radius: 68, color: "#ffeaa7", score: 28 },
    { label: "🍑", radius: 80, color: "#fab1a0", score: 36 },
    { label: "🍍", radius: 92, color: "#fd79a8", score: 45 },
    { label: "🍈", radius: 105, color: "#55efc4", score: 55 },
    
    // 【西瓜範例】：這裡使用了外部的 PNG 圖片網址
    { 
        label: "🍉", 
        radius: 120, 
        color: "#2ecc71", 
        score: 66, 
        texture: "https://3c.yipee.cc/122682/", // 外部圖片網址
        originalWidth: 512 // 這張網址圖片的原始寬度是 512 像素
    }
];

const engine = Engine.create({ gravity: { y: 1.2 } });
const world = engine.world;

const render = Render.create({
    element: container,
    engine: engine,
    options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#fff9e6' }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

const wallOptions = { isStatic: true, render: { fillStyle: '#8d6e63' } };
const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 10, WIDTH, 20, wallOptions);
const leftWall = Bodies.rectangle(10, HEIGHT / 2, 20, HEIGHT, wallOptions);
const rightWall = Bodies.rectangle(WIDTH - 10, HEIGHT / 2, 20, HEIGHT, wallOptions);
Composite.add(world, [ground, leftWall, rightWall]);

// --- 💡 自動處理圖片與文字的生成邏輯 ---
function createFruit(x, y, level, isStatic = false) {
    const config = FRUIT_TYPES[level];
    
    const options = {
        isStatic: isStatic,
        restitution: 0.2,
        friction: 0.1,
        label: "fruit",
        render: {}
    };

    // 判斷是否有外部圖片網址
    if (config.texture) {
        // 計算縮放比例：(目標直徑) / 圖片原始寬度
        const scale = (config.radius * 2) / (config.originalWidth || 100);
        options.render.sprite = {
            texture: config.texture,
            xScale: scale,
            yScale: scale
        };
    } else {
        options.render.fillStyle = config.color;
    }
    
    const fruit = Bodies.circle(x, y, config.radius, options);
    fruit.fruitLevel = level;
    
    // 如果沒有圖片，才渲染 Emoji 文字
    if (!config.texture) {
        fruit.render.text = {
            content: config.label,
            size: config.radius * 1.2
        };
    }

    return fruit;
}

function spawnNextFruit() {
    if (!isReadyToDrop) return;
    const randomLevel = Math.floor(Math.random() * 5);
    currentFruit = createFruit(WIDTH / 2, 50, randomLevel, true);
    Composite.add(world, currentFruit);
}

window.addEventListener('mousemove', (e) => {
    if (!currentFruit || currentFruit.isStatic === false) return;
    const rect = container.getBoundingClientRect();
    let mouseX = e.clientX - rect.left;
    const minX = 30 + FRUIT_TYPES[currentFruit.fruitLevel].radius;
    const maxX = WIDTH - 30 - FRUIT_TYPES[currentFruit.fruitLevel].radius;
    if (mouseX < minX) mouseX = minX;
    if (mouseX > maxX) mouseX = maxX;
    Body.setPosition(currentFruit, { x: mouseX, y: 50 });
});

window.addEventListener('click', () => {
    if (!currentFruit || !isReadyToDrop) return;
    isReadyToDrop = false;
    Body.setStatic(currentFruit, false);
    setTimeout(() => {
        isReadyToDrop = true;
        spawnNextFruit();
    }, 1000);
});

Events.on(engine, 'collisionStart', (event) => {
    const pairs = event.pairs;
    pairs.forEach((pair) => {
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        if (bodyA.label === "fruit" && bodyB.label === "fruit") {
            if (bodyA.fruitLevel === bodyB.fruitLevel) {
                const currentLevel = bodyA.fruitLevel;
                
                if (currentLevel >= FRUIT_TYPES.length - 1) {
                    Composite.remove(world, [bodyA, bodyB]);
                    score += 100;
                    scoreDisplay.innerText = score;
                    return;
                }
                
                const newX = (bodyA.position.x + bodyB.position.x) / 2;
                const newY = (bodyA.position.y + bodyB.position.y) / 2;
                
                bodyA.fruitLevel = -1;
                bodyB.fruitLevel = -1;
                
                Composite.remove(world, [bodyA, bodyB]);
                
                const nextFruit = createFruit(newX, newY, currentLevel + 1, false);
                Composite.add(world, nextFruit);
                
                score += FRUIT_TYPES[currentLevel].score;
                scoreDisplay.innerText = score;
            }
        }
    });
});

// 負責把沒有圖片的水果畫上 Emoji 表情
Events.on(render, 'afterRender', () => {
    const context = render.context;
    const bodies = Composite.allBodies(world);
    
    bodies.forEach((body) => {
        if (body.render && body.render.text) {
            const { content, size } = body.render.text;
            context.font = `${size}px Arial`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.save();
            context.translate(body.position.x, body.position.y);
            context.rotate(body.angle);
            context.fillText(content, 0, 0);
            context.restore();
        }
    });
});

spawnNextFruit();
</script>
</body>
</html>
